<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Güerometry Dash</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Luckiest+Guy&display=swap');

    * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background: #070b20; font-family: Arial, sans-serif;
      touch-action: manipulation;
    }

    #game {
      width: 100vw; height: 100vh; position: relative; overflow: hidden;
      background: #1459d9;
      color: white;
    }

    .bg-pattern::before {
      content: "";
      position: absolute; inset: 0; opacity: .23;
      background:
        linear-gradient(45deg, transparent 44%, rgba(255,255,255,.5) 45%, rgba(255,255,255,.5) 55%, transparent 56%) 0 0 / 90px 90px,
        radial-gradient(circle at 15px 15px, rgba(255,255,255,.45) 0 5px, transparent 6px) 0 0 / 75px 75px,
        linear-gradient(90deg, transparent 47%, rgba(255,255,255,.35) 48%, rgba(255,255,255,.35) 52%, transparent 53%) 0 0 / 120px 120px;
      pointer-events: none;
    }

    .screen {
      position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 24px; text-align: center; padding: 20px;
    }
    .screen.active { display: flex; }

    .title {
      font-family: 'Press Start 2P', cursive;
      font-size: clamp(24px, 5vw, 58px);
      text-shadow: 5px 5px 0 #052567, 0 0 16px rgba(255,255,255,.8);
      letter-spacing: 2px; line-height: 1.25;
      color: #f7fbff;
    }

    .gd-btn {
      border: 4px solid white;
      background: linear-gradient(#35d34b, #159622);
      color: white;
      font-family: 'Luckiest Guy', cursive;
      font-size: clamp(20px, 4vw, 36px);
      padding: 14px 32px;
      min-width: 190px;
      border-radius: 18px;
      box-shadow: 0 8px 0 #0b5c15, 0 0 20px rgba(255,255,255,.35);
      cursor: pointer;
      text-shadow: 2px 2px 0 #063a0b;
    }
    .gd-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #0b5c15; }

    .play-btn {
      width: 115px; height: 115px; border-radius: 28px;
      font-size: 0; position: relative;
    }
    .play-btn::after {
      content: "";
      position: absolute; left: 44px; top: 28px;
      border-left: 42px solid white;
      border-top: 28px solid transparent;
      border-bottom: 28px solid transparent;
      filter: drop-shadow(2px 2px 0 #084e12);
    }

    .level-list {
      width: min(760px, 92vw);
      display: flex; flex-direction: column; gap: 14px;
    }
    .level-card {
      width: 100%;
      border: 4px solid white;
      background: linear-gradient(180deg, #9b5b25, #5a2e13);
      border-radius: 18px;
      min-height: 82px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 18px;
      box-shadow: inset 0 0 0 4px rgba(0,0,0,.18), 0 6px 0 rgba(0,0,0,.45);
      cursor: pointer;
    }
    .level-card:active { transform: translateY(4px); box-shadow: inset 0 0 0 4px rgba(0,0,0,.18), 0 2px 0 rgba(0,0,0,.45); }

    .level-name {
      font-family: 'Luckiest Guy', cursive;
      font-size: clamp(22px, 3.2vw, 36px);
      color: white; text-shadow: 2px 2px 0 #111;
      text-align: left;
    }

    .face {
      width: 58px; height: 58px; border-radius: 50%;
      border: 4px solid white; position: relative; flex: 0 0 auto;
      box-shadow: inset -6px -7px 0 rgba(0,0,0,.25), 0 0 12px rgba(255,255,255,.45);
    }
    .face.easy { background: #1fa8ff; }
    .face.hard { background: #ffd321; }
    .face.demon { background: #991111; border-radius: 38% 38% 45% 45%; }
    .face::before, .face::after {
      content: ""; position: absolute; width: 8px; height: 14px; background: #111; top: 18px;
      border-radius: 3px;
    }
    .face::before { left: 16px; }
    .face::after { right: 16px; }
    .face.easy .mouth {
      position: absolute; left: 15px; top: 32px; width: 25px; height: 12px;
      border-bottom: 5px solid #111; border-radius: 0 0 25px 25px;
    }
    .face.hard .mouth {
      position: absolute; left: 15px; top: 36px; width: 26px; height: 5px;
      background: #111; border-radius: 3px;
    }
    .face.demon::before, .face.demon::after { background: #ffef38; transform: rotate(18deg); }
    .face.demon::before { transform: rotate(-18deg); }
    .face.demon .hornL, .face.demon .hornR {
      position: absolute; top: -19px; width: 0; height: 0;
      border-left: 12px solid transparent; border-right: 12px solid transparent;
      border-bottom: 24px solid white;
    }
    .face.demon .hornL { left: 4px; transform: rotate(-25deg); }
    .face.demon .hornR { right: 4px; transform: rotate(25deg); }
    .face.demon .mouth {
      position: absolute; left: 13px; top: 36px; width: 30px; height: 10px;
      background: #111; border-radius: 0 0 16px 16px;
    }

    canvas { position: absolute; inset: 0; width: 100%; height: 100%; background: #0d55e8; }

    #hud {
      position: absolute; top: 8px; left: 0; right: 0; z-index: 5;
      display: none; align-items: center; gap: 12px; padding: 0 14px;
      font-family: 'Press Start 2P', cursive; font-size: 12px;
    }
    #pauseBtn {
      width: 42px; height: 36px; border: 3px solid white; background: #111a; color: white;
      border-radius: 8px; font-size: 18px; font-weight: bold;
    }
    .barWrap {
      flex: 1; height: 16px; border: 3px solid white; background: #0009; border-radius: 99px; overflow: hidden;
    }
    #barFill { width: 0%; height: 100%; background: linear-gradient(90deg, #6cff35, #d4ff30); }
    #percent { min-width: 54px; text-shadow: 2px 2px 0 #000; }

    .modal {
      position: absolute; inset: 0; z-index: 10; display: none;
      align-items: center; justify-content: center; flex-direction: column; gap: 18px;
      background: rgba(0,0,0,.55);
    }
    .modal.active { display: flex; }
    .panel {
      width: min(500px, 90vw); padding: 28px; border-radius: 24px;
      border: 5px solid white; background: linear-gradient(#1c78ff, #083e9b);
      box-shadow: 0 0 30px rgba(255,255,255,.35);
      text-align: center;
    }
    .panel h2 {
      margin: 0 0 18px; font-family: 'Luckiest Guy', cursive; font-size: 42px;
      text-shadow: 3px 3px 0 #111;
    }

    .small-btn {
      font-family: 'Luckiest Guy', cursive;
      font-size: 24px;
      border: 4px solid white; color: white;
      border-radius: 16px; background: linear-gradient(#f24b4b, #a41010);
      padding: 10px 24px; cursor: pointer; margin: 6px;
      box-shadow: 0 5px 0 #540808;
      text-shadow: 2px 2px 0 #111;
    }

    .hint {
      font-family: Arial, sans-serif;
      font-size: 14px; opacity: .95; text-shadow: 1px 1px 0 #000;
      max-width: 680px;
    }
  </style>
</head>
<body>
  <div id="game" class="bg-pattern">
    <section id="mainMenu" class="screen active">
      <div class="title">Güerometry<br>Dash</div>
      <button class="gd-btn play-btn" id="goLevels" aria-label="Play"></button>
      <div class="hint">Toca / click / espacio para saltar. Mantén presionado para saltos seguidos.</div>
    </section>

    <section id="levelMenu" class="screen">
      <div class="title" style="font-size: clamp(20px, 3.5vw, 42px)">Selecciona nivel</div>
      <div class="level-list">
        <div class="level-card" data-level="stereo">
          <div class="level-name">Stereo Madness</div>
          <div class="face easy"><div class="mouth"></div></div>
        </div>
        <div class="level-card" data-level="cant">
          <div class="level-name">Can't Let Go</div>
          <div class="face hard"><div class="mouth"></div></div>
        </div>
        <div class="level-card" data-level="toe2">
          <div class="level-name">Theory of Everything 2</div>
          <div class="face demon"><span class="hornL"></span><span class="hornR"></span><div class="mouth"></div></div>
        </div>
      </div>
      <button class="small-btn" id="backMain">Atrás</button>
    </section>

    <canvas id="canvas"></canvas>

    <div id="hud">
      <button id="pauseBtn">☰</button>
      <div class="barWrap"><div id="barFill"></div></div>
      <div id="percent">0%</div>
    </div>

    <div id="pauseModal" class="modal">
      <div class="panel">
        <h2>Pausa</h2>
        <button class="small-btn" id="resumeBtn" style="background:linear-gradient(#35d34b,#159622);box-shadow:0 5px 0 #0b5c15">Seguir</button>
        <button class="small-btn" id="exitBtn">Salir</button>
      </div>
    </div>

    <div id="completeModal" class="modal">
      <div class="panel">
        <h2>Level Complete!</h2>
        <div id="completeText" style="font-family:'Press Start 2P';font-size:14px;margin-bottom:14px">100%</div>
        <button class="small-btn" id="completeBack" style="background:linear-gradient(#35d34b,#159622);box-shadow:0 5px 0 #0b5c15">Menú</button>
      </div>
    </div>
  </div>

<script>
(() => {
  const game = document.getElementById("game");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  const mainMenu = document.getElementById("mainMenu");
  const levelMenu = document.getElementById("levelMenu");
  const hud = document.getElementById("hud");
  const barFill = document.getElementById("barFill");
  const percentEl = document.getElementById("percent");
  const pauseModal = document.getElementById("pauseModal");
  const completeModal = document.getElementById("completeModal");
  const completeText = document.getElementById("completeText");

  let W = 0, H = 0, groundY = 0;
  let state = "menu";
  let current = null;
  let audio = null;
  let last = 0;
  let holding = false;
  let attempts = 1;

  function resize() {
    W = canvas.width = window.innerWidth * devicePixelRatio;
    H = canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
    W = window.innerWidth;
    H = window.innerHeight;
    groundY = H - 72;
  }
  addEventListener("resize", resize);
  resize();

  const LEVELS = {
    stereo: {
      name: "Stereo Madness",
      audio: "stereo.mp3",
      bg: "#084adf",
      pattern: "rgba(255,255,255,.28)",
      speed: 360,
      durationFallback: 32,
      obstacles: [
        {x: 520, type:"spike"},
        {x: 850, type:"spike"},
        {x: 925, type:"spike"},
        {x: 1300, type:"block", w:120, h:42, y:-42},
        {x: 1640, type:"spike"},
        {x: 2020, type:"spike"},
        {x: 2095, type:"spike"},
        {x: 2500, type:"block", w:150, h:42, y:-42},
        {x: 2920, type:"spike"},
        {x: 3300, type:"spike"},
        {x: 3380, type:"spike"},
        {x: 3820, type:"spike"}
      ]
    },
    cant: {
      name: "Can't Let Go",
      audio: "cantletgo.mp3",
      bg: "#d02a82",
      pattern: "rgba(255,190,235,.32)",
      speed: 390,
      durationFallback: 34,
      obstacles: [
        {x: 480, type:"spike"}, {x: 760, type:"spike"}, {x: 835, type:"spike"},
        {x: 1180, type:"block", w:130, h:42, y:-42},
        {x: 1500, type:"spike"}, {x: 1575, type:"spike"},
        {x: 1950, type:"spike"}, {x: 2320, type:"block", w:160, h:42, y:-42},
        {x: 2700, type:"spike"}, {x: 2775, type:"spike"}, {x: 2850, type:"spike"},
        {x: 3320, type:"spike"}, {x: 3700, type:"spike"}
      ]
    },
    toe2: {
      name: "Theory of Everything 2",
      audio: "toe2.mp3",
      bg: "#050508",
      pattern: "rgba(170,170,170,.23)",
      speed: 430,
      durationFallback: 36,
      obstacles: [
        {x: 460, type:"spike"}, {x: 700, type:"spike"}, {x: 775, type:"spike"},
        {x: 1080, type:"block", w:120, h:42, y:-42},
        {x: 1380, type:"spike"}, {x: 1455, type:"spike"},
        {x: 1750, type:"spike"},
        {x: 2100, type:"wall", w:45, h:150, y:-150},
        {x: 2480, type:"spike"}, {x: 2555, type:"spike"},
        {x: 2880, type:"block", w:150, h:42, y:-42},
        {x: 3300, type:"spike"}, {x: 3375, type:"spike"}, {x: 3450, type:"spike"},
        {x: 3920, type:"wall", w:45, h:180, y:-180}
      ]
    }
  };

  const player = {
    x: 85, y: 0, size: 42, vy: 0, rot: 0, onGround: false
  };

  function showScreen(screen) {
    mainMenu.classList.remove("active");
    levelMenu.classList.remove("active");
    hud.style.display = "none";
    canvas.style.display = "none";
    pauseModal.classList.remove("active");
    completeModal.classList.remove("active");
    if (screen === "main") mainMenu.classList.add("active");
    if (screen === "levels") levelMenu.classList.add("active");
    if (screen === "game") {
      canvas.style.display = "block";
      hud.style.display = "flex";
    }
  }

  function setBg(level) {
    game.style.background = level.bg;
    canvas.style.background = level.bg;
    document.documentElement.style.setProperty("--pat", level.pattern);
  }

  function startLevel(id) {
    current = JSON.parse(JSON.stringify(LEVELS[id]));
    current.id = id;
    current.startTime = performance.now();
    current.distance = 0;
    current.finished = false;
    attempts = 1;
    player.y = groundY - player.size;
    player.vy = 0; player.rot = 0; player.onGround = true;
    setBg(current);
    showScreen("game");

    if (audio) { audio.pause(); audio.currentTime = 0; }
    audio = new Audio(current.audio);
    audio.preload = "auto";
    audio.volume = 0.9;
    audio.addEventListener("loadedmetadata", () => {
      if (isFinite(audio.duration) && audio.duration > 3) current.durationFallback = audio.duration;
    });
    audio.play().catch(() => {});
    state = "playing";
    last = performance.now();
    requestAnimationFrame(loop);
  }

  function restartLevel() {
    if (!current) return;
    attempts++;
    current.distance = 0;
    current.startTime = performance.now();
    player.y = groundY - player.size;
    player.vy = 0;
    player.rot = 0;
    player.onGround = true;
    if (audio) { audio.pause(); audio.currentTime = 0; audio.play().catch(()=>{}); }
  }

  function exitToLevels() {
    state = "levels";
    if (audio) { audio.pause(); audio.currentTime = 0; }
    showScreen("levels");
  }

  function completeLevel() {
    state = "complete";
    if (audio) audio.pause();
    completeText.textContent = current.name + " • 100%";
    completeModal.classList.add("active");
  }

  function jump() {
    if (state !== "playing") return;
    if (player.onGround) {
      player.vy = -680;
      player.onGround = false;
    }
  }

  function inputDown(e) { e.preventDefault?.(); holding = true; jump(); }
  function inputUp(e) { e.preventDefault?.(); holding = false; }
  addEventListener("pointerdown", inputDown);
  addEventListener("pointerup", inputUp);
  addEventListener("keydown", e => {
    if (e.code === "Space" || e.code === "ArrowUp") { holding = true; jump(); }
    if (e.code === "Escape" && state === "playing") pause();
  });
  addEventListener("keyup", e => { if (e.code === "Space" || e.code === "ArrowUp") holding = false; });

  function pause() {
    if (state !== "playing") return;
    state = "paused";
    if (audio) audio.pause();
    pauseModal.classList.add("active");
  }

  function resume() {
    if (state !== "paused") return;
    state = "playing";
    if (audio) audio.play().catch(()=>{});
    pauseModal.classList.remove("active");
    last = performance.now();
    requestAnimationFrame(loop);
  }

  function rectsOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  function drawBg(level) {
    ctx.fillStyle = level.bg;
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = level.pattern;
    ctx.lineWidth = 2;

    const offset = -(current.distance * 0.25 % 90);
    for (let x = offset; x < W + 100; x += 90) {
      for (let y = 35; y < H; y += 90) {
        ctx.strokeRect(x, y, 28, 28);
        ctx.beginPath();
        ctx.moveTo(x+55, y+2);
        ctx.lineTo(x+78, y+35);
        ctx.lineTo(x+32, y+35);
        ctx.closePath();
        ctx.stroke();
      }
    }

    ctx.fillStyle = "#111";
    ctx.fillRect(0, groundY, W, H-groundY);
    ctx.fillStyle = "rgba(255,255,255,.16)";
    for (let x = -((current.distance)%40); x < W; x += 40) {
      ctx.fillRect(x, groundY, 20, 6);
    }
  }

  function drawPlayer() {
    ctx.save();
    ctx.translate(player.x + player.size/2, player.y + player.size/2);
    ctx.rotate(player.rot);
    const s = player.size;
    ctx.fillStyle = "#00b7ff";
    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;
    ctx.fillRect(-s/2, -s/2, s, s);
    ctx.strokeRect(-s/2, -s/2, s, s);

    ctx.strokeStyle = "#07183d";
    ctx.lineWidth = 6;
    ctx.strokeRect(-s/4, -s/4, s/2, s/2);
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.strokeRect(-s/4, -s/4, s/2, s/2);
    ctx.restore();
  }

  function drawSpike(x, y, size=42) {
    ctx.fillStyle = "#111";
    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, y+size);
    ctx.lineTo(x+size/2, y);
    ctx.lineTo(x+size, y+size);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }

  function drawBlock(x, y, w, h) {
    ctx.fillStyle = "#7b3f17";
    ctx.strokeStyle = "white";
    ctx.lineWidth = 3;
    ctx.fillRect(x,y,w,h);
    ctx.strokeRect(x,y,w,h);
    ctx.fillStyle = "rgba(255,255,255,.18)";
    for (let i=0;i<w;i+=32) ctx.fillRect(x+i+4,y+4,18,6);
  }

  function drawWall(x, y, w, h) {
    ctx.fillStyle = "#222";
    ctx.strokeStyle = "#cfcfcf";
    ctx.lineWidth = 3;
    ctx.fillRect(x,y,w,h);
    ctx.strokeRect(x,y,w,h);
  }

  function obstacleRect(o) {
    const screenX = o.x - current.distance;
    if (o.type === "spike") return {x:screenX+7, y:groundY-38, w:28, h:34};
    if (o.type === "block") return {x:screenX, y:groundY+o.y, w:o.w, h:o.h};
    if (o.type === "wall") return {x:screenX, y:groundY+o.y, w:o.w, h:o.h};
  }

  function drawObstacles() {
    for (const o of current.obstacles) {
      const x = o.x - current.distance;
      if (x < -250 || x > W + 250) continue;
      if (o.type === "spike") drawSpike(x, groundY-42);
      if (o.type === "block") drawBlock(x, groundY+o.y, o.w, o.h);
      if (o.type === "wall") drawWall(x, groundY+o.y, o.w, o.h);
    }
  }

  function loop(t) {
    if (state !== "playing") return;
    const dt = Math.min((t-last)/1000, 0.033);
    last = t;

    current.distance += current.speed * dt;

    player.vy += 1650 * dt;
    player.y += player.vy * dt;
    if (!player.onGround) player.rot += 7.5 * dt;

    if (player.y >= groundY - player.size) {
      player.y = groundY - player.size;
      player.vy = 0;
      player.onGround = true;
      player.rot = Math.round(player.rot / (Math.PI/2)) * (Math.PI/2);
    }

    const pRect = {x: player.x+5, y: player.y+5, w: player.size-10, h: player.size-10};
    for (const o of current.obstacles) {
      const r = obstacleRect(o);
      if (!r) continue;
      if (rectsOverlap(pRect, r)) {
        // Blocks act as simple obstacles too; this keeps it reliable for school project.
        restartLevel();
        break;
      }
    }

    drawBg(current);
    drawObstacles();
    drawPlayer();

    const duration = current.durationFallback || 30;
    const elapsed = audio && isFinite(audio.currentTime) ? audio.currentTime : (performance.now()-current.startTime)/1000;
    const pct = Math.min(100, Math.floor((elapsed / duration) * 100));
    barFill.style.width = pct + "%";
    percentEl.textContent = pct + "%";

    if (pct >= 100 || (audio && audio.ended)) {
      completeLevel();
      return;
    }
    requestAnimationFrame(loop);
  }

  document.getElementById("goLevels").onclick = () => showScreen("levels");
  document.getElementById("backMain").onclick = () => showScreen("main");
  document.querySelectorAll(".level-card").forEach(card => {
    card.onclick = () => startLevel(card.dataset.level);
  });
  document.getElementById("pauseBtn").onclick = pause;
  document.getElementById("resumeBtn").onclick = resume;
  document.getElementById("exitBtn").onclick = exitToLevels;
  document.getElementById("completeBack").onclick = exitToLevels;
})();
</script>
</body>
</html>
